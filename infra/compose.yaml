services:
  postgres:
    image: postgres:16
    env_file:
      - ../.env
    container_name: postgres
    restart: unless-stopped

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

    networks:
      - app_net

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loca_user"]
      interval: 10s
      timeout: 5s
      retries: 5

